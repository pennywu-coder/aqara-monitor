<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aqara AU 社媒情报监控</title>
<style>
  body { background:#0d0f14; color:#e8eaf0; font-family:-apple-system,sans-serif;
         display:flex; align-items:center; justify-content:center;
         min-height:100vh; text-align:center; }
  .box { max-width:480px; }
  .dot { width:12px; height:12px; background:#00c8a0; border-radius:50%;
         display:inline-block; margin-bottom:24px;
         animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  h1 { font-size:24px; margin-bottom:12px; }
  p  { color:#8b8fa8; font-size:14px; line-height:1.7; }
  code { background:#1a1e28; padding:2px 8px; border-radius:4px;
         font-size:12px; color:#00c8a0; }
</style>
</head>
<body>
<div class="box">
  <div class="dot"></div>
  <h1>Aqara AU 社媒情报监控</h1>
  <p>系统已部署，等待首次运行。</p>
  <p style="margin-top:16px">
    前往 <code>Actions</code> 标签页 → 点击
    <code>Run workflow</code> 立即生成第一份报告。
  </p>
</div>
</body>
</html>
